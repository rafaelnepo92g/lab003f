name: 2 - Internal Windows Execution
on:
  workflow_run:
    workflows: ["1 - Public Build Pipeline"]
    types: [completed]

jobs:
  deploy-and-run:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: m4v3r1ck
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: 'Download Artifact'
        uses: actions/github-script@v7
        with:
          script: |
            let allArtifacts = await github.rest.actions.listWorkflowRunArtifacts({
               owner: context.repo.owner,
               repo: context.repo.repo,
               run_id: context.payload.workflow_run.id,
            });
            let matchArtifact = allArtifacts.data.artifacts.find((arg) => arg.name.startsWith("package-pr-"));
            if (!matchArtifact) throw new Error("Artefato não encontrado!");
            
            let download = await github.rest.actions.downloadArtifact({
               owner: context.repo.owner,
               repo: context.repo.repo,
               artifact_id: matchArtifact.id,
               archive_format: 'zip',
            });
            require('fs').writeFileSync(`${process.env.GITHUB_WORKSPACE}/package.zip`, Buffer.from(download.data));

      - name: Prepare and Execute
        shell: powershell
        run: |
          Remove-Item -Recurse -Force not_exploitable
          Expand-Archive -Path package.zip -DestinationPath ./install -Force
          
          # Cria venv
          python -m venv venv-exec
          
          # Instala dependências
          ./venv-exec/Scripts/pip install -r ./requirements.txt

          # Instala o pacote
          $pkg = Get-ChildItem ./install/*.whl | Select-Object -First 1
          ./venv-exec/Scripts/pip install $pkg.FullName
          
          # Roda o main protegido
          ./venv-exec/Scripts/python ./main.py

      - name: Cleanup
        if: always()
        run: |
          if (Test-Path venv-exec) { Remove-Item -Recurse -Force venv-exec }
          if (Test-Path install) { Remove-Item -Recurse -Force install }
          if (Test-Path package.zip) { Remove-Item -Force package.zip }
